  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---- Brand palette -------------------------------------- */\n  --ink:    #121827;  /* primary text · dark slide bg */\n  --paper:  #FFFFFF;  /* default slide bg */\n  --red:    #E2401B;  /* Redpanda primary — sparingly */\n  --orange: #ED8346;  /* secondary accent */\n  --yellow: #FFEC89;  /* tertiary highlight */\n  --cream:  #FAEAE5;  /* tinted bg */\n  --gray:   #F3F5F9;  /* alt bg */\n  --slate:  #697084;  /* captions / secondary text */\n  --teal:   #0097A7;  /* data-viz only */\n  --line:   #E6E8EE;  /* hairlines */\n\n  /* ---- Semantic colors ------------------------------------ */\n  --fg1: var(--ink);        /* primary text */\n  --fg2: var(--slate);      /* captions, eyebrows on dark */\n  --fg-accent: var(--red);  /* emphasis, eyebrow, accents */\n  --fg-on-dark: var(--paper);\n  --fg-on-dark-2: #C8CCD6;  /* body on ink */\n  --fg-on-dark-3: #8089A0;  /* caption on ink */\n  --bg-default: var(--paper);\n  --bg-alt: var(--gray);\n  --bg-tinted: var(--cream);\n  --bg-dark: var(--ink);\n  --border: var(--line);\n  --border-dark: #2A3045;   /* hairlines on ink */\n\n  /* ---- Typography stacks ---------------------------------- */\n  --serif: \"Instrument Serif\", \"Garamond\", \"Times New Roman\", serif;\n  --sans:  \"Space Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n  --mono:  ui-monospace, \"JetBrains Mono\", \"SFMono-Regular\", Menlo, monospace;\n\n  /* ---- Type scale ----------------------------------------- *\n   * serif always negative letter-spacing (-0.015 to -0.03em)\n   * mono  always positive (+0.06 to +0.18em)\n   * ---------------------------------------------------------- */\n  --h-section: 220px;  /* section dividers */\n  --h-title:   140px;  /* title-only slides */\n  --h-page:     96px;  /* standard page heading */\n  --h-mid:      72px;  /* mid heading */\n  --h-small:    28px;  /* small heading (sans 600) */\n  --body-lg:    36px;  /* large body */\n  --body:       28px;  /* default body */\n  --caption:    22px;  /* caption (slate) */\n  --eyebrow:    18px;  /* mono red uppercase, 0.18em tracking */\n\n  /* ---- Spacing & motifs ----------------------------------- */\n  --pad-slide-x: 96px;\n  --pad-slide-y: 96px;\n  --pad-panel:   36px;\n  --gap-card:    32px;\n  --radius-chip: 999px;\n  --hairline:    1px;\n  --stroke-arrow: 2px;\n}\n\n/* ---------- Semantic typography classes -------------------- */\n\n.serif {\n  font-family: var(--serif);\n  font-weight: 400;\n  letter-spacing: -0.015em;\n  line-height: 1.02;\n}\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: var(--eyebrow);\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--red);\n  font-weight: 500;\n}\n\n.h-section { font-family: var(--serif); font-size: var(--h-section); line-height: 0.9;  letter-spacing: -0.03em;  font-weight: 400; }\n.h-title   { font-family: var(--serif); font-size: var(--h-title);   line-height: 0.95; letter-spacing: -0.025em; font-weight: 400; }\n.h-page    { font-family: var(--serif); font-size: var(--h-page);    line-height: 1.0;  letter-spacing: -0.02em;  font-weight: 400; }\n.h-mid     { font-family: var(--serif); font-size: var(--h-mid);     line-height: 1.05; letter-spacing: -0.018em; font-weight: 400; }\n.h-small   { font-family: var(--sans);  font-size: var(--h-small);   line-height: 1.35; letter-spacing: -0.01em;  font-weight: 600; }\n\n.body-lg { font-size: var(--body-lg); line-height: 1.4;  color: var(--ink);   font-weight: 400; }\n.body    { font-size: var(--body);    line-height: 1.45; color: var(--ink); }\n.caption { font-size: var(--caption); line-height: 1.4;  color: var(--slate); }\n\n.mono-label {\n  font-family: var(--mono);\n  font-size: 14px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--slate);\n}\n\n/* ---------- Base body default (when this file is the only stylesheet) ---------- */\nbody {\n  font-family: var(--sans);\n  color: var(--fg1);\n  background: var(--bg-default);\n  font-size: var(--body);\n  line-height: 1.45;\n  letter-spacing: -0.005em;\n}\n<\u002Fstyle>\n<style>/* ---- Redpanda Slide System: tokens + base ---- */\n\n:root {\n  /* Colors — extracted directly from theme1.xml of the master deck */\n  --ink:    #121827; /* primary text, dark mode bg */\n  --paper:  #FFFFFF; /* default slide bg */\n  --red:    #E2401B; /* Redpanda primary */\n  --orange: #ED8346; /* secondary accent */\n  --yellow: #FFEC89; /* tertiary accent (highlights) */\n  --slate:  #697084; /* secondary text, captions */\n  --gray:   #F3F5F9; /* alt slide bg, dividers */\n  --cream:  #FAEAE5; /* tinted slide bg, fills */\n  --teal:   #0097A7; /* data-viz accent only */\n  --line:   #E6E8EE;\n\n  /* Type */\n  --serif: \"Instrument Serif\", \"Garamond\", \"Times New Roman\", serif;\n  --sans:  \"Space Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n  --mono:  ui-monospace, \"JetBrains Mono\", \"SFMono-Regular\", Menlo, monospace;\n}\n\n/* ---- Stage chrome ---- */\ndeck-stage:not(:defined) { visibility: hidden; }\nhtml, body { margin: 0; background: #000; }\nbody { font-family: var(--sans); color: var(--ink); }\n\n/* ---- Slide base ---- */\ndeck-stage > section {\n  position: relative;\n  width: 1920px;\n  height: 1080px;\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 28px;\n  line-height: 1.4;\n  overflow: hidden;\n  box-sizing: border-box;\n  letter-spacing: -0.005em;\n}\n\n/* ---- Footer & layout caption (template chrome on every layout slide) ---- */\n.tpl-footer {\n  position: absolute;\n  left: 64px;\n  right: 64px;\n  bottom: 36px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  font-family: var(--mono);\n  font-size: 16px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--slate);\n  z-index: 10;\n}\n.tpl-footer .tpl-tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n}\n.tpl-footer .tpl-tag b {\n  color: var(--ink);\n  font-weight: 600;\n}\n.tpl-footer .tpl-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--red);\n  display: inline-block;\n}\n.tpl-footer .tpl-pg { color: var(--ink); font-weight: 500; }\n\n/* Usage-notes callout for the layout catalog */\n.tpl-notes {\n  position: absolute;\n  right: 64px;\n  bottom: 80px;\n  max-width: 380px;\n  padding: 18px 20px;\n  background: var(--ink);\n  color: #C8CCD6;\n  font-family: var(--mono);\n  font-size: 13px;\n  line-height: 1.6;\n  letter-spacing: 0.01em;\n  z-index: 11;\n  border-left: 3px solid var(--red);\n}\n.tpl-notes b {\n  display: block;\n  color: var(--paper);\n  font-family: var(--sans);\n  font-size: 12px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  margin-bottom: 6px;\n  font-weight: 600;\n}\n\n/* dark slides */\nsection.dark { background: var(--ink); color: var(--paper); }\nsection.dark .tpl-footer { color: #8089A0; }\nsection.dark .tpl-footer .tpl-tag b,\nsection.dark .tpl-footer .tpl-pg { color: var(--paper); }\nsection.dark .tpl-notes { background: var(--paper); color: #4A5066; border-left-color: var(--red); }\nsection.dark .tpl-notes b { color: var(--ink); }\n\nsection.cream { background: var(--cream); }\nsection.gray  { background: var(--gray); }\n\n/* ---- Typography scale ---- */\n.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.015em; line-height: 1.02; }\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 18px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--red);\n  font-weight: 500;\n}\n.h-title { font-family: var(--serif); font-size: 140px; line-height: 0.95; letter-spacing: -0.025em; font-weight: 400; }\n.h-section { font-family: var(--serif); font-size: 220px; line-height: 0.9; letter-spacing: -0.03em; font-weight: 400; }\n.h-page { font-family: var(--serif); font-size: 96px; line-height: 1.0; letter-spacing: -0.02em; font-weight: 400; }\n.h-mid { font-family: var(--serif); font-size: 72px; line-height: 1.05; letter-spacing: -0.018em; font-weight: 400; }\n.h-small { font-family: var(--sans); font-size: 28px; line-height: 1.35; font-weight: 600; letter-spacing: -0.01em; }\n.body-lg { font-size: 36px; line-height: 1.4; color: var(--ink); font-weight: 400; }\n.body { font-size: 28px; line-height: 1.45; color: var(--ink); }\n.caption { font-size: 22px; color: var(--slate); line-height: 1.4; }\n\n/* logo lockup */\n.logo {\n  display: inline-flex;\n  align-items: center;\n  gap: 14px;\n}\n.logo img { height: 36px; display: block; }\n\n/* ---- Cover-specific decoration ---- */\n.cover-dotbg {\n  position: absolute; inset: 0;\n  background-image: url(\"fd913bc2-92cf-4586-aea6-147c94cb263b\");\n  background-size: cover;\n  background-position: center;\n}\n.cover-pixelbg {\n  position: absolute; inset: 0;\n  background-image: url(\"0fed2858-4c43-4390-9c7e-0278d7f4e1e0\");\n  background-size: cover;\n  background-position: center;\n}\n\n/* ---- Pill / chip ---- */\n.chip {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 10px 18px;\n  border: 1.5px solid var(--ink);\n  border-radius: 999px;\n  font-family: var(--mono);\n  font-size: 15px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink);\n  background: transparent;\n}\n.chip.dark { color: var(--paper); border-color: rgba(255,255,255,0.6); }\n.chip.filled { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n\n/* image-as-placeholder */\n.placeholder {\n  position: relative;\n  background: repeating-linear-gradient(135deg, #ECEEF3 0 12px, #F6F7FA 12px 24px);\n  color: var(--slate);\n  font-family: var(--mono);\n  font-size: 14px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  display: flex; align-items: center; justify-content: center;\n  border: 1px solid var(--line);\n}\n\n/* ---- Numbered list (agenda) ---- */\n.numlist { list-style: none; padding: 0; margin: 0; }\n.numlist li {\n  display: grid;\n  grid-template-columns: 60px 1fr;\n  align-items: baseline;\n  padding: 22px 0;\n  border-top: 1px solid var(--line);\n  font-family: var(--serif);\n  font-size: 44px;\n  letter-spacing: -0.015em;\n  color: var(--ink);\n}\n.numlist li:last-child { border-bottom: 1px solid var(--line); }\n.numlist li .n {\n  font-family: var(--mono);\n  font-size: 16px;\n  letter-spacing: 0.12em;\n  color: var(--red);\n  text-transform: uppercase;\n  font-weight: 500;\n}\n\n/* ---- bullets ---- */\nul.bullets { list-style: none; padding: 0; margin: 0; }\nul.bullets li {\n  position: relative;\n  padding: 14px 0 14px 38px;\n  font-size: 32px;\n  line-height: 1.4;\n  border-top: 1px solid var(--line);\n}\nul.bullets li:last-child { border-bottom: 1px solid var(--line); }\nul.bullets li::before {\n  content: \"\";\n  position: absolute;\n  left: 0; top: 28px;\n  width: 18px; height: 2px;\n  background: var(--red);\n}\n\n/* ---- card / panel ---- */\n.panel {\n  background: var(--paper);\n  border: 1px solid var(--line);\n  padding: 36px;\n}\n\n/* tag dot */\n.tagdot {\n  display: inline-block;\n  width: 10px; height: 10px;\n  border-radius: 50%;\n  background: var(--red);\n  margin-right: 12px;\n  vertical-align: middle;\n}\n\n/* ---- swatch grid (kit of parts: colors) ---- */\n.swatch {\n  display: flex; flex-direction: column; gap: 12px;\n}\n.swatch .chip-color {\n  width: 100%;\n  flex: 1 1 0;\n  min-height: 0;\n  border-radius: 4px;\n  border: 1px solid rgba(0,0,0,0.06);\n}\n.swatch .label {\n  font-family: var(--mono);\n  font-size: 20px;\n  color: var(--ink);\n  letter-spacing: 0.06em;\n  font-weight: 500;\n}\n.swatch .hex {\n  font-family: var(--mono);\n  font-size: 18px;\n  color: var(--slate);\n  letter-spacing: 0.04em;\n}\n\n/* ---- bracket / corner markers for \"spec\" feel on the catalog ---- */\n.bracket {\n  position: absolute;\n  width: 24px; height: 24px;\n  border: 2px solid var(--red);\n}\n.bracket.tl { top: 48px; left: 48px; border-right: 0; border-bottom: 0; }\n.bracket.tr { top: 48px; right: 48px; border-left: 0; border-bottom: 0; }\n.bracket.bl { bottom: 48px; left: 48px; border-right: 0; border-top: 0; }\n.bracket.br { bottom: 48px; right: 48px; border-left: 0; border-top: 0; }\n<\u002Fstyle>\n<style>deck-stage:not(:defined){visibility:hidden}<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n\n<!-- ══ 01 · COVER ══ -->\n<section class=\"dark\" data-label=\"01 Title\" data-speaker-notes=\"Set the frame: Redpanda's Agentic Data Plane is the substrate for putting AI agents into production safely. Not another agent framework — the governed data plane every agent sits on top of. Today is a value story proven by a live, hands-on exercise: we'll stand ADP up with Claude on Bedrock and run it from Claude Code and our own code.\">\n  <div style=\"position:absolute; top:80px; left:80px; right:80px; display:flex; align-items:center; justify-content:space-between;\">\n    <div class=\"logo\"><img src=\"d0047dde-0c8b-426e-ba13-964522eaadf6\" style=\"filter:brightness(0) invert(1); height:34px;\"><\u002Fdiv>\n    <div class=\"chip dark\">Agentic Data Plane · 2026<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; right:96px; top:130px; width:400px; height:400px;\">\n    <img src=\"a5f56ca8-22ed-4284-a771-39c1b7336d84\" style=\"width:100%; height:100%; object-fit:contain;\">\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:80px; right:80px; bottom:190px;\">\n    <div class=\"eyebrow\" style=\"color:var(--orange); margin-bottom:34px;\">Redpanda Agentic Data Plane<\u002Fdiv>\n    <h1 class=\"serif\" style=\"font-size:150px; line-height:0.95; letter-spacing:-0.028em; margin:0; max-width:1550px; color:var(--paper);\">\n      The backbone of the<br>autonomous workforce.\n    <\u002Fh1>\n    <div class=\"body-lg\" style=\"margin-top:36px; max-width:1150px; color:#C8CCD6;\">\n      See, control, and trust every AI agent you run — then prove it live, hands-on, with Claude on AWS Bedrock.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 02 · THE PROBLEM ══ -->\n<section data-label=\"02 Problem\" data-speaker-notes=\"The reason agents stall in the enterprise is not model quality — it's the operating environment. Today's agents are single-player: they can't reach operational data safely, there's no way to govern their behavior in production, no audit trail when something goes wrong, and no visibility into cost. The usual fix — a loose API key per developer and an ungoverned agent per team — does not scale past a demo.\">\n  <div style=\"padding:96px 96px 0;\">\n    <div class=\"eyebrow\">The problem<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:20px 0 0; max-width:1550px;\">\n      Enterprise agents are stuck<br>in single-player mode.\n    <\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:520px; top:470px;\">\n    <ul class=\"bullets\" style=\"font-size:32px;\">\n      <li>No trusted access to operational data<\u002Fli>\n      <li>No way to govern agent behavior in production<\u002Fli>\n      <li>No audit trail when an agent goes wrong<\u002Fli>\n      <li>No visibility into what agents cost<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; right:96px; top:470px; width:360px;\">\n    <div class=\"serif\" style=\"font-size:52px; line-height:1.08; color:var(--ink); max-width:360px;\">\n      Loose API keys and ungoverned agents don't scale.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Part 1<\u002Fb> · Why ADP<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 03 · THE PROMISE / 3 Cs ══ -->\n<section data-label=\"03 Promise · 3 Cs\" data-speaker-notes=\"The promise is simple: see, control, and trust every AI agent you run. Redpanda organizes that into three pillars — the 3 Cs. Connect gives agents secure, mediated access to models, apps, and data. Control defines their roles, permissions, and budgets. Operate observes, records, and — when needed — stops them. These three are the through-line for the rest of the deck: every hands-on step maps back to one of them.\">\n  <div style=\"padding:96px 96px 0;\">\n    <div class=\"eyebrow\">The promise<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:20px 0 0; max-width:1600px; font-size:88px;\">\n      See, control, and trust every AI agent you run.\n    <\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:440px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap:32px;\">\n    <div class=\"panel\">\n      <div style=\"font-family:var(--mono); font-size:14px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-bottom:18px;\">01 · Connect<\u002Fdiv>\n      <div class=\"h-small\" style=\"font-size:34px; margin-bottom:14px;\">Mediated access to models, apps, and data.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:21px;\">300+ connectors. MCP, Kafka, Iceberg, SQL. Open protocols — MCP, A2A, OTel — so nothing is locked in.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"panel\">\n      <div style=\"font-family:var(--mono); font-size:14px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-bottom:18px;\">02 · Control<\u002Fdiv>\n      <div class=\"h-small\" style=\"font-size:34px; margin-bottom:14px;\">Roles, permissions, and budgets with clear scopes.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:21px;\">OIDC identity, on-behalf-of authorization, data redaction, token budgets and spend limits, LLM routing with failover.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"panel\">\n      <div style=\"font-family:var(--mono); font-size:14px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-bottom:18px;\">03 · Operate<\u002Fdiv>\n      <div class=\"h-small\" style=\"font-size:34px; margin-bottom:14px;\">Observe, record, and stop every action.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:21px;\">Browse and debug behavior, session replay, immutable audit logs, transcript export, and a kill switch for bad agents.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Part 1<\u002Fb> · The 3 Cs<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 04 · ARCHITECTURE ══ -->\n<section data-label=\"04 Architecture\" data-speaker-notes=\"One picture of the request path, and where governance happens. A developer, Claude Code, or a standalone service presents an OIDC bearer token to the Redpanda ADP AI Gateway — that hop is Control: identity and RBAC. The gateway holds the upstream provider credentials, enforces permissions, and meters and records every call — that's Operate. It then reaches AWS Bedrock and Claude on your behalf — that's Connect. MCP tool servers and managed agents live behind the same gateway, so they inherit the same identity, governance, and audit trail.\">\n  <div style=\"padding:80px 96px 0;\">\n    <div class=\"eyebrow\">Architecture<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:18px 0 0; font-size:76px;\">One gateway. Every hop governed.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:300px; display:flex; align-items:stretch; gap:0;\">\n    <!-- client -->\n    <div style=\"flex:0 0 320px; display:flex; flex-direction:column; justify-content:center;\">\n      <div class=\"panel\" style=\"padding:28px;\">\n        <div class=\"mono-label\" style=\"margin-bottom:14px;\">Client<\u002Fdiv>\n        <div style=\"font-size:26px; line-height:1.35;\">Developer · Claude Code · A service<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- arrow 1 -->\n    <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 14px;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.1em; text-transform:uppercase; color:var(--slate); margin-bottom:10px;\">OIDC bearer token<\u002Fdiv>\n      <svg width=\"100%\" height=\"26\" viewBox=\"0 0 200 26\" preserveAspectRatio=\"none\"><line x1=\"0\" y1=\"13\" x2=\"182\" y2=\"13\" stroke=\"#E2401B\" stroke-width=\"2\"><\u002Fline><polygon points=\"182,6 200,13 182,20\" fill=\"#E2401B\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"font-family:var(--mono); font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-top:10px;\">Control<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- gateway -->\n    <div style=\"flex:0 0 460px; background:var(--ink); color:var(--paper); padding:32px;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.14em; text-transform:uppercase; color:var(--orange); margin-bottom:14px;\">Redpanda ADP · AI Gateway<\u002Fdiv>\n      <div class=\"serif\" style=\"font-size:40px; line-height:1.06; color:var(--paper); margin-bottom:22px;\">Holds creds. Enforces RBAC. Meters &amp; records.<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n        <div style=\"border:1px solid #2A3045; padding:12px 14px; font-size:18px;\">MCP tool servers<\u002Fdiv>\n        <div style=\"border:1px solid #2A3045; padding:12px 14px; font-size:18px;\">Managed agents<\u002Fdiv>\n        <div style=\"border:1px solid #2A3045; padding:12px 14px; font-size:18px;\">Audit log<\u002Fdiv>\n        <div style=\"border:1px solid #2A3045; padding:12px 14px; font-size:18px;\">Cost &amp; usage<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- arrow 2 -->\n    <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 14px;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.1em; text-transform:uppercase; color:var(--slate); margin-bottom:10px;\">Provider creds<\u002Fdiv>\n      <svg width=\"100%\" height=\"26\" viewBox=\"0 0 200 26\" preserveAspectRatio=\"none\"><line x1=\"0\" y1=\"13\" x2=\"182\" y2=\"13\" stroke=\"#E2401B\" stroke-width=\"2\"><\u002Fline><polygon points=\"182,6 200,13 182,20\" fill=\"#E2401B\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"font-family:var(--mono); font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-top:10px;\">Connect<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- bedrock -->\n    <div style=\"flex:0 0 340px; display:flex; flex-direction:column; justify-content:center;\">\n      <div class=\"panel\" style=\"padding:28px;\">\n        <img src=\"7f95f3c5-c06e-449f-a3e9-96cea5c45474\" style=\"display:block; width:64px; height:64px; margin-bottom:16px; object-fit:contain;\">\n        <div class=\"mono-label\" style=\"margin-bottom:14px;\">AWS Bedrock<\u002Fdiv>\n        <div style=\"font-size:26px; line-height:1.3; margin-bottom:12px;\">Claude, on your account<\u002Fdiv>\n        <div style=\"font-family:var(--mono); font-size:16px; color:var(--slate); word-break:break-all;\">us.anthropic.<br>claude-sonnet-4-6<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:720px;\">\n    <div class=\"caption\" style=\"font-size:23px; max-width:1500px;\">Every request carries a real identity, every call is metered, and the transcript is recorded — no matter which client made it. <b style=\"color:var(--ink); font-weight:500;\">Connect, Control, and Operate on the same path.<\u002Fb><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Part 1<\u002Fb> · Architecture<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 05 · EXERCISE 1 ══ -->\n<section data-label=\"05 Ex1 · Connect\" data-speaker-notes=\"Exercise 1, README Step 1 — Connect. You plug Claude-on-Bedrock into ADP exactly once: register the LLM provider and point it at your Bedrock account. The upstream AWS credentials now live inside ADP, not in every developer's shell. One note that trips people up: current Claude models on Bedrock are addressed by inference-profile IDs — the global., us., or eu. prefixes — not the bare model ID. What to notice: you've replaced scattered keys with one governed front door.\">\n  <div style=\"padding:88px 96px 0;\">\n    <div class=\"eyebrow\">Exercise 1 — Connect · README Step 1<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:76px; line-height:1.0; letter-spacing:-0.02em; margin:18px 0 0; max-width:1200px;\">Connect Claude on Bedrock, once.<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"position:absolute; top:128px; right:96px; display:flex; align-items:center; gap:16px;\">\n    <img src=\"7f95f3c5-c06e-449f-a3e9-96cea5c45474\" style=\"display:block; width:64px; height:64px; object-fit:contain;\">\n    <div style=\"font-family:var(--mono); font-size:16px; letter-spacing:0.12em; text-transform:uppercase; color:var(--slate); line-height:1.3;\">AWS<br>Bedrock<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:320px; bottom:150px; display:grid; grid-template-columns: 1.05fr 0.95fr; gap:64px;\">\n    <div>\n      <div class=\"mono-label\" style=\"margin-bottom:22px;\">You'll do<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:29px;\">\n        <li>Register a Bedrock LLM provider in ADP<\u002Fli>\n        <li>Store the upstream AWS credentials in ADP, not in shells<\u002Fli>\n        <li>Address models by inference profile ID<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:32px; font-family:var(--mono); font-size:20px; background:var(--gray); border:1px solid var(--line); padding:18px 22px; line-height:1.7;\">\n        <div><span style=\"color:var(--red);\">us.<\u002Fspan>anthropic.claude-sonnet-4-6<\u002Fdiv>\n        <div><span style=\"color:var(--red);\">eu.<\u002Fspan>anthropic.claude-haiku-4-5<\u002Fdiv>\n        <div><span style=\"color:var(--red);\">global.<\u002Fspan>anthropic.claude-sonnet-4-6<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--ink); color:var(--paper); padding:40px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:20px;\">What to notice<\u002Fdiv>\n      <div class=\"serif\" style=\"font-size:52px; line-height:1.06; color:var(--paper);\">One governed front door instead of scattered keys.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:22px; color:#C8CCD6; margin-top:auto;\">Rotate a credential once, in one place — every agent and developer inherits it.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Connect<\u002Fb> · Exercise 1 of 6<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 06 · EXERCISE 2 ══ -->\n<section data-label=\"06 Ex2 · Curate tools\" data-speaker-notes=\"Exercise 2, README Step 2 — still Connect. Register a tool server — we use the Petstore OpenAPI demo — then open the Inspector and enumerate the full tool list the agent would otherwise see. It's long, and most of it is noise or risk: writes, deletes, endpoints the agent will never call. Then use ADP to curate that list down centrally — disable everything unneeded. What to notice: every extra tool is wasted context and extra attack surface. ADP hands the agent a tight, safe toolset without touching the tool server itself.\">\n  <div style=\"padding:88px 96px 0;\">\n    <div class=\"eyebrow\">Exercise 2 — Connect · README Step 2<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:76px; line-height:1.0; letter-spacing:-0.02em; margin:18px 0 0; max-width:1500px;\">Enumerate the tools, then curate them.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:320px; bottom:150px; display:grid; grid-template-columns: 1.05fr 0.95fr; gap:64px;\">\n    <div>\n      <div class=\"mono-label\" style=\"margin-bottom:22px;\">You'll do<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:29px;\">\n        <li>Register an MCP server (Petstore OpenAPI demo)<\u002Fli>\n        <li>Open the Inspector to enumerate the full tool list<\u002Fli>\n        <li>Disable the writes, deletes, and anything unneeded<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:32px; display:flex; align-items:center; gap:20px; font-family:var(--mono); font-size:22px;\">\n        <div style=\"padding:16px 22px; border:1px solid var(--line); background:var(--gray); color:var(--slate);\">18 tools exposed<\u002Fdiv>\n        <svg width=\"60\" height=\"20\" viewBox=\"0 0 60 20\"><line x1=\"0\" y1=\"10\" x2=\"44\" y2=\"10\" stroke=\"#E2401B\" stroke-width=\"2\"><\u002Fline><polygon points=\"44,4 60,10 44,16\" fill=\"#E2401B\"><\u002Fpolygon><\u002Fsvg>\n        <div style=\"padding:16px 22px; border:1px solid var(--ink); background:var(--ink); color:var(--paper);\">5 tools enabled<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--ink); color:var(--paper); padding:40px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:20px;\">What to notice<\u002Fdiv>\n      <div class=\"serif\" style=\"font-size:52px; line-height:1.06; color:var(--paper);\">Every extra tool is wasted context and extra risk.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:22px; color:#C8CCD6; margin-top:auto;\">Trim the toolset centrally in ADP — the agent gets a tight, safe surface without changing the server.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Connect<\u002Fb> · Exercise 2 of 6<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 07 · EXERCISE 3 ══ -->\n<section data-label=\"07 Ex3 · Claude Code through ADP\" data-speaker-notes=\"Exercise 3, README Step 3 (3a–3h) — Control. Create the OAuth client / service account so Claude Code runs through ADP: keys stay server-side, usage is tracked, transcripts are auditable — and it can reach managed MCP servers over the gateway. Make the auth-vs-authz split explicit. The Client ID and Secret mint a short-lived token — that's who you are, authentication. A Redpanda role binding decides what you can do — that's authorization: grant dataplane_adp_llmprovider_invoke via the built-in LLMProviderInvoker role, bound at CLUSTER scope. Watch the two look-alike IDs: the Service Account ID is what you bind the role to; the OAuth Client ID is what mints tokens. Swapping them is the number-one cause of 403s.\">\n  <div style=\"padding:80px 96px 0;\">\n    <div class=\"eyebrow\">Exercise 3 — Control · README Step 3 (3a–3h)<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:72px; line-height:1.0; letter-spacing:-0.02em; margin:16px 0 0; max-width:1500px;\">Run Claude Code through ADP.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:300px; bottom:140px; display:grid; grid-template-columns: 1fr 1fr; gap:56px;\">\n    <div>\n      <div class=\"mono-label\" style=\"margin-bottom:20px;\">You'll do<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:27px;\">\n        <li>Create the OAuth client / service account<\u002Fli>\n        <li>Bind <b style=\"font-weight:500;\">LLMProviderInvoker<\u002Fb> at cluster scope<\u002Fli>\n        <li>Point Claude Code at the gateway — zero raw keys on the laptop<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:26px; display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n        <div style=\"border:1px solid var(--line); padding:18px 20px;\">\n          <div style=\"font-family:var(--mono); font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); margin-bottom:8px;\">Authentication<\u002Fdiv>\n          <div style=\"font-size:22px; line-height:1.3;\">Client ID + Secret mint a short-lived token — <i>who you are<\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line); padding:18px 20px;\">\n          <div style=\"font-family:var(--mono); font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); margin-bottom:8px;\">Authorization<\u002Fdiv>\n          <div style=\"font-size:22px; line-height:1.3;\">A role binding decides <i>what you can do<\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:24px;\">\n      <div style=\"background:var(--ink); color:var(--paper); padding:34px; flex:1; display:flex; flex-direction:column;\">\n        <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:16px;\">What to notice<\u002Fdiv>\n        <div class=\"serif\" style=\"font-size:44px; line-height:1.08; color:var(--paper);\">The developer's everyday tool is now fully governed — with zero raw keys.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid var(--line); background:var(--cream); padding:24px 28px;\">\n        <div style=\"font-family:var(--mono); font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--red); margin-bottom:12px;\">Don't mix these up<\u002Fdiv>\n        <div style=\"font-family:var(--mono); font-size:19px; line-height:1.9;\"><span style=\"color:var(--slate);\">bind role →<\u002Fspan> &lt;service-account-id&gt;<br><span style=\"color:var(--slate);\">mint token →<\u002Fspan> &lt;oauth-client-id&gt;<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Control<\u002Fb> · Exercise 3 of 6<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 08 · CONTROL AT SCALE ══ -->\n<section class=\"cream\" data-label=\"08 Control at scale\" data-speaker-notes=\"Step back from the click-through for one slide. What you just configured by hand — an identity with a scoped permission — is the tip of the Control pillar. At scale, ADP also gives you token budgets and hard spend limits per client and agent, LLM routing with automatic failover across providers, on-behalf-of authorization so an agent acts as the user who invoked it, and fine-grained data filtering and redaction at the boundary. Same control point, richer policy.\">\n  <div style=\"padding:96px 96px 0;\">\n    <div class=\"eyebrow\">Control · beyond the exercise<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:20px 0 0; max-width:1500px;\">Control, at scale.<\u002Fh2>\n    <div class=\"body-lg\" style=\"color:var(--slate); max-width:1200px; margin-top:20px;\">The hands-on role binding is one policy on the same control point. ADP layers on the rest.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:500px; display:grid; grid-template-columns: 1fr 1fr; column-gap:96px;\">\n    <ul class=\"bullets\" style=\"font-size:31px; border-color:rgba(18,24,39,0.12);\">\n      <li>Token budgets and hard spend limits<\u002Fli>\n      <li>LLM routing with automatic failover<\u002Fli>\n      <li>On-behalf-of authorization<\u002Fli>\n    <\u002Ful>\n    <ul class=\"bullets\" style=\"font-size:31px;\">\n      <li>Fine-grained data filtering and redaction<\u002Fli>\n      <li>Per-client and per-agent scopes<\u002Fli>\n      <li>One policy surface, one place to change a rule<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Control<\u002Fb> · At scale<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 09 · EXERCISE 4 ══ -->\n<section data-label=\"09 Ex4 · Build an agent\" data-speaker-notes=\"Exercise 4, README Step 4 — Connect plus Control. A Redpanda-managed agent is just Claude, the curated MCP tools from Exercise 2, and a system prompt — and you can test it right there in the Inspector. Now the bonus, and it's the real point: add a subagent that extracts data from a verbose MCP server. The subagent carries the full noisy tool list and does the multi-tool digging, then returns a compact result to the parent — so tool sprawl never pollutes the parent's context window. What to notice: orchestration — a parent plus a specialized subagent — is how you scale past single-player mode.\">\n  <div style=\"padding:80px 96px 0;\">\n    <div class=\"eyebrow\">Exercise 4 — Connect + Control · README Step 4<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:72px; line-height:1.0; letter-spacing:-0.02em; margin:16px 0 0; max-width:1500px;\">Build an agent, add a subagent.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:300px; bottom:140px; display:grid; grid-template-columns: 1fr 1fr; gap:56px;\">\n    <div>\n      <div class=\"mono-label\" style=\"margin-bottom:20px;\">You'll do<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:28px;\">\n        <li>Compose an agent: Claude + curated tools + system prompt<\u002Fli>\n        <li>Test it in the Inspector<\u002Fli>\n        <li><b style=\"font-weight:500;\">Bonus —<\u002Fb> add a subagent to mine a verbose MCP server<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:30px; display:flex; align-items:center; gap:18px;\">\n        <div style=\"border:1px solid var(--ink); padding:20px 24px; font-size:22px; font-weight:500;\">Parent agent<\u002Fdiv>\n        <svg width=\"76\" height=\"20\" viewBox=\"0 0 76 20\"><line x1=\"0\" y1=\"10\" x2=\"60\" y2=\"10\" stroke=\"#E2401B\" stroke-width=\"2\"><\u002Fline><polygon points=\"60,4 76,10 60,16\" fill=\"#E2401B\"><\u002Fpolygon><line x1=\"76\" y1=\"10\" x2=\"16\" y2=\"10\" stroke=\"#E2401B\" stroke-width=\"2\" opacity=\"0\"><\u002Fline><\u002Fsvg>\n        <div style=\"border:1px solid var(--line); background:var(--gray); padding:20px 24px; font-size:22px;\">Subagent<div style=\"font-family:var(--mono); font-size:14px; color:var(--slate); letter-spacing:0.06em; margin-top:4px;\">holds the full noisy tool list<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--ink); color:var(--paper); padding:40px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:18px;\">What to notice<\u002Fdiv>\n      <div class=\"serif\" style=\"font-size:50px; line-height:1.06; color:var(--paper);\">The subagent returns a compact result — tool sprawl stays out of the parent's context.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:22px; color:#C8CCD6; margin-top:auto;\">Orchestration is how you scale past single-player mode.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Connect + Control<\u002Fb> · Exercise 4 of 6<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 10 · EXERCISE 5 ══ -->\n<section data-label=\"10 Ex5 · Cost &amp; usage\" data-speaker-notes=\"Exercise 5, README Step 5 — Operate. This is the governance payoff made visible. Open ADP's Cost and Usage views: spend and request counts broken out per provider, per agent, per client. Every run has a transcript you can pull for audit. And the kill switch is right there — if an agent misbehaves, you stop it. What to notice: you can see and attribute every request and every dollar. That's the difference between a demo and something you'd run in production.\">\n  <div style=\"padding:88px 96px 0;\">\n    <div class=\"eyebrow\">Exercise 5 — Operate · README Step 5<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:76px; line-height:1.0; letter-spacing:-0.02em; margin:18px 0 0; max-width:1500px;\">See every request and every dollar.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:320px; bottom:150px; display:grid; grid-template-columns: 1.05fr 0.95fr; gap:64px;\">\n    <div>\n      <div class=\"mono-label\" style=\"margin-bottom:22px;\">You'll do<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:29px;\">\n        <li>Open Cost &amp; Usage — spend and requests per provider, agent, client<\u002Fli>\n        <li>Pull a transcript for audit<\u002Fli>\n        <li>Find the kill switch for stopping a bad agent<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:32px; display:flex; gap:48px;\">\n        <div><div class=\"serif\" style=\"font-size:88px; line-height:0.9; color:var(--red);\">$/agent<\u002Fdiv><div class=\"caption\" style=\"font-size:18px; letter-spacing:0.08em; text-transform:uppercase; margin-top:8px;\">attributed spend<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"serif\" style=\"font-size:88px; line-height:0.9; color:var(--red);\">Replay<\u002Fdiv><div class=\"caption\" style=\"font-size:18px; letter-spacing:0.08em; text-transform:uppercase; margin-top:8px;\">every transcript<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--ink); color:var(--paper); padding:40px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:20px;\">What to notice<\u002Fdiv>\n      <div class=\"serif\" style=\"font-size:52px; line-height:1.06; color:var(--paper);\">You can see and attribute every request and every dollar.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:22px; color:#C8CCD6; margin-top:auto;\">Immutable audit logs and a kill switch turn \"we hope it behaves\" into \"we can prove it did.\"<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Operate<\u002Fb> · Exercise 5 of 6<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 11 · EXERCISE 6 ══ -->\n<section data-label=\"11 Ex6 · Standalone service\" data-speaker-notes=\"Exercise 6, README Step 6 — Operate and Connect. Now call the agent from outside the console. Every ADP agent is A2A-compliant: it publishes a public agent card at /.well-known/agent-card.json describing how to call it, and agent creation provisions a service account whose client credentials you exchange for a short-lived access token. From external code: fetch the card, get a token, send an A2A message over HTTP, and capture the output — write it to a file, hand it to the next pipeline stage. What to notice: agents become callable building blocks — and because the call still goes through the gateway, it's governed and recorded exactly like the interactive ones.\">\n  <div style=\"padding:88px 96px 0;\">\n    <div class=\"eyebrow\">Exercise 6 — Operate / Connect · README Step 6<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:76px; line-height:1.0; letter-spacing:-0.02em; margin:18px 0 0; max-width:1500px;\">Call an agent from your own code.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:320px; bottom:150px; display:grid; grid-template-columns: 1.05fr 0.95fr; gap:64px;\">\n    <div>\n      <div class=\"mono-label\" style=\"margin-bottom:22px;\">You'll do<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:29px;\">\n        <li>Exchange client credentials for a short-lived token<\u002Fli>\n        <li>Call the agent over HTTP with the A2A protocol<\u002Fli>\n        <li>Capture the output — e.g. write it to a file<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:32px; font-family:var(--mono); font-size:18px; background:var(--gray); border:1px solid var(--line); padding:20px 24px; line-height:1.8;\">\n        <div><span style=\"color:var(--slate);\">GET<\u002Fspan> &lt;agent-url&gt;/.well-known/agent-card.json<\u002Fdiv>\n        <div><span style=\"color:var(--slate);\">POST<\u002Fspan> &lt;agent-url&gt; · A2A message/send<\u002Fdiv>\n        <div><span style=\"color:var(--slate);\">Authorization:<\u002Fspan> Bearer &lt;access-token&gt;<\u002Fdiv>\n        <div><span style=\"color:var(--red);\">→<\u002Fspan> capture response to output.json<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--ink); color:var(--paper); padding:40px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange); margin-bottom:20px;\">What to notice<\u002Fdiv>\n      <div class=\"serif\" style=\"font-size:52px; line-height:1.06; color:var(--paper);\">Agents become callable building blocks — every external call still governed and recorded.<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:22px; color:#C8CCD6; margin-top:auto;\">Same identity, same audit trail, whether the caller is a person or a cron job.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Operate / Connect<\u002Fb> · Exercise 6 of 6<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 12 · ONE COMMAND ══ -->\n<section class=\"gray\" data-label=\"12 One command\" data-speaker-notes=\"You just did the Control step by hand so you understand every piece. In practice, the adp-claude-code-service-account-auth.sh wrapper collapses the whole thing into one command: it creates the service account, binds the role at cluster scope, mints a token, smoke-tests Bedrock, writes the Claude Code settings, and launches Claude Code — persisting the creds to a git-ignored env file. The philosophy: understand it manually once, then automate it forever.\">\n  <div style=\"padding:96px 96px 0;\">\n    <div class=\"eyebrow\">Part 3 · Make it real<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:20px 0 0; max-width:1500px; font-size:84px;\">From clicks to one command.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:380px; display:grid; grid-template-columns: 1fr 1fr; gap:64px; align-items:start;\">\n    <div style=\"background:var(--ink); color:var(--paper); padding:36px; font-family:var(--mono); font-size:21px; line-height:1.5;\">\n      <div style=\"color:var(--orange); font-size:14px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:20px;\">One wrapper<\u002Fdiv>\n      <div style=\"word-break:break-all;\">./adp-claude-code-<br>service-account-auth.sh<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <ul class=\"bullets\" style=\"font-size:27px;\">\n        <li>Create the service account, bind the role at cluster scope<\u002Fli>\n        <li>Mint a token, smoke-test Bedrock<\u002Fli>\n        <li>Write Claude Code settings, launch Claude Code<\u002Fli>\n        <li>Persist creds to a git-ignored env file<\u002Fli>\n      <\u002Ful>\n      <div class=\"serif\" style=\"font-size:40px; line-height:1.1; margin-top:32px; max-width:760px;\">Understand it manually once — then automate it.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Part 3<\u002Fb> · Automate<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 13 · GOTCHAS ══ -->\n<section data-label=\"13 Gotchas\" data-speaker-notes=\"The traps, so you don't lose the room to them. On the Redpanda side, a 403 saying it lacks permission dataplane_adp_llmprovider_invoke almost always means one of three things: you bound the role to the wrong ID, you bound it at provider scope which isn't honored at runtime — use cluster scope, or you minted the token before the binding existed, so it's stale. On the AWS side: Claude 4.6 and newer require inference profiles, not bare model IDs; and Bedrock Marketplace engines need the AWS Marketplace IAM permissions or they'll fail to deploy. None of these are hard — they're just the ones that eat an hour if you don't know them.\">\n  <div style=\"padding:96px 96px 0;\">\n    <div class=\"eyebrow\">Part 3 · Lessons learned<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:20px 0 0; max-width:1500px; font-size:80px;\">The 403 trap, and AWS gotchas.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:400px; display:grid; grid-template-columns: 1fr 1fr; column-gap:80px;\">\n    <div>\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-bottom:20px;\">Redpanda side<\u002Fdiv>\n      <div style=\"font-family:var(--mono); font-size:18px; background:var(--ink); color:var(--paper); padding:16px 20px; margin-bottom:24px; line-height:1.5;\">403 lacks permission<br>dataplane_adp_llmprovider_invoke<\u002Fdiv>\n      <ul class=\"bullets\" style=\"font-size:26px;\">\n        <li>Wrong ID bound — service account vs OAuth client<\u002Fli>\n        <li>Provider-scope binding not honored — use cluster scope<\u002Fli>\n        <li>Stale token minted before the binding existed<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:var(--mono); font-size:15px; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-bottom:20px;\">AWS side<\u002Fdiv>\n      <img src=\"7f95f3c5-c06e-449f-a3e9-96cea5c45474\" style=\"display:block; width:60px; height:60px; margin-bottom:22px; object-fit:contain;\">\n      <ul class=\"bullets\" style=\"font-size:26px;\">\n        <li>Inference profiles required for Claude 4.6+ — not bare IDs<\u002Fli>\n        <li>Model access not enabled in the target region — ValidationException<\u002Fli>\n        <li>Bedrock Marketplace engines need AWS Marketplace IAM permissions<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Part 3<\u002Fb> · Gotchas<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 14 · DEPLOY ANYWHERE ══ -->\n\n\n<!-- ══ 15 · MULTIPLAYER ══ -->\n<section class=\"dark\" data-label=\"15 Multiplayer mode\" data-speaker-notes=\"Where you are now. You started with three pillars — Connect, Control, Operate. And in the last half hour you built the proof: a governed gateway holding your Bedrock credentials, a curated toolset, a working agent with a subagent, and two ways to call it — from Claude Code and from your own code. That's a team ready for multiplayer mode. Next steps: point it at a real data source, wire budgets and redaction to your policy, and put a second agent behind the same gateway.\">\n  <div style=\"position:absolute; right:0; top:0; width:52%; height:100%; opacity:0.5;\">\n    <img src=\"a5f56ca8-22ed-4284-a771-39c1b7336d84\" style=\"width:100%; height:100%; object-fit:cover; object-position:20% center;\">\n  <\u002Fdiv>\n  <div style=\"position:absolute; inset:0; background: linear-gradient(90deg, rgba(18,24,39,1) 34%, rgba(18,24,39,0.5) 68%, rgba(18,24,39,0) 100%);\"><\u002Fdiv>\n\n  <div style=\"position:absolute; top:80px; left:80px;\"><div class=\"logo\"><img src=\"d0047dde-0c8b-426e-ba13-964522eaadf6\" style=\"filter:brightness(0) invert(1); height:34px;\"><\u002Fdiv><\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:820px; top:210px;\">\n    <div class=\"eyebrow\" style=\"color:var(--orange); margin-bottom:28px;\">Recap<\u002Fdiv>\n    <h2 class=\"serif\" style=\"font-size:120px; line-height:0.92; letter-spacing:-0.03em; color:var(--paper); margin:0;\">Get to<br>multiplayer<br>mode.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:820px; bottom:150px;\">\n    <div style=\"display:flex; gap:14px; margin-bottom:28px;\">\n      <div class=\"chip dark\">Connect<\u002Fdiv>\n      <div class=\"chip dark\">Control<\u002Fdiv>\n      <div class=\"chip dark\">Operate<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"body-lg\" style=\"color:#C8CCD6; max-width:820px;\">\n      What you have now: a governed gateway, a curated toolset, a working agent, and two ways to call it. Next: real data, your budgets and redaction, a second agent behind the same gateway.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Recap<\u002Fb> · Multiplayer mode<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ 16 · APPENDIX ══ -->\n<section class=\"gray\" data-label=\"16 Appendix\" data-speaker-notes=\"Appendix — the repo map, so you can retrace every step. README.md is the walkthrough with the numbered steps we mirrored. AWS_BEDROCK_SETUP.md covers the provider and inference-profile setup. The auth shell script is the one-command wrapper. TROUBLESHOOTING.md has the full 403 and AWS gotcha catalog. And the value messaging is all grounded in redpanda.com/agentic-data-plane.\">\n  <div style=\"padding:96px 96px 0;\">\n    <div class=\"eyebrow\">Appendix<\u002Fdiv>\n    <h2 class=\"h-page\" style=\"margin:20px 0 8px; font-size:76px;\">Repo map &amp; links.<\u002Fh2>\n    <div class=\"caption\" style=\"max-width:1200px;\">Everything you need to retrace the exercise on your own cluster.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; right:96px; top:420px; display:grid; grid-template-columns: 1fr 1fr; gap:24px;\">\n    <div style=\"background:var(--paper); border:1px solid var(--line); padding:28px 32px;\">\n      <div style=\"font-family:var(--mono); font-size:20px; color:var(--ink); margin-bottom:8px;\">README.md<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:20px;\">The walkthrough — Steps 1–6 (Step 3 is 3a–3h)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--paper); border:1px solid var(--line); padding:28px 32px;\">\n      <div style=\"font-family:var(--mono); font-size:20px; color:var(--ink); margin-bottom:8px;\">AWS_BEDROCK_SETUP.md<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:20px;\">Provider + inference-profile setup<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--paper); border:1px solid var(--line); padding:28px 32px;\">\n      <div style=\"font-family:var(--mono); font-size:20px; color:var(--ink); margin-bottom:8px;\">adp-claude-code-service-account-auth.sh<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:20px;\">The one-command Control wrapper<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--paper); border:1px solid var(--line); padding:28px 32px;\">\n      <div style=\"font-family:var(--mono); font-size:20px; color:var(--ink); margin-bottom:8px;\">TROUBLESHOOTING.md<\u002Fdiv>\n      <div class=\"caption\" style=\"font-size:20px;\">The 403 and AWS gotcha catalog<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; left:96px; bottom:120px; font-family:var(--mono); font-size:20px; letter-spacing:0.06em; color:var(--slate);\">\n    Value messaging · <span style=\"color:var(--red);\">redpanda.com/agentic-data-plane<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"tpl-footer\"><div class=\"tpl-tag\"><span class=\"tpl-dot\"><\u002Fspan><b>Appendix<\u002Fb><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n\n<\u002Fdeck-stage>\n<script src=\"53a5b11a-4522-4ad9-9708-0ba8df3b6f77\"><\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
